{% extends 'base.html' %}
{% block title %}Platform Control | NOMAD{% endblock %}

{% block content %}
<div class="auth-page" style="background: #050403;">
  <div class="auth-left" style="display: none;"></div>
  <div class="auth-right" style="width: 100%; border: none; background: transparent;">
    <div class="auth-box reveal" style="max-width: 400px; margin: 0 auto; background: var(--surface); padding: 48px; border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: 0 24px 64px rgba(0,0,0,0.8);">
      <div style="font-family: var(--font-mono); font-size: 11px; color: var(--danger); letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 24px; display: flex; align-items: center; gap: 8px;">
        <i data-lucide="shield-alert" style="width: 16px; height: 16px;"></i> Restricted
      </div>
      
      <h1 style="font-family: var(--font-heading); font-size: 32px; letter-spacing: 0.05em; margin-bottom: 32px; display: flex; align-items: center; justify-content: space-between;">
        System Login <span style="font-family: var(--font-display); font-size: 14px; letter-spacing: 0; color: var(--text-dim);">NOMAD</span>
      </h1>

      <form method="POST" action="{% url 'superadmin_login' %}">
        {% csrf_token %}
        <div class="form-group">
          <label class="form-label" for="email">Admin ID</label>
          <input type="email" id="email" name="email" class="form-control" style="font-family: var(--font-mono);" required autofocus>
        </div>
        <div class="form-group" style="margin-bottom: 40px;">
          <label class="form-label" for="password">Passphrase</label>
          <input type="password" id="password" name="password" class="form-control" style="font-family: var(--font-mono); letter-spacing: 2px;" required>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; background: var(--text); color: var(--bg); box-shadow: 0 4px 20px rgba(255,255,255,0.1);">Authenticate</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
