{% extends 'base.html' %}
{% block title %}Owner Login | NOMAD{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-left" style="background: url('/static/images/image1.jpg') center/cover; position: relative;">
    <div style="position: absolute; inset: 0; background: linear-gradient(to right, rgba(14,12,10,0.4), var(--bg));"></div>
  </div>
  <div class="auth-right">
    <div class="auth-box reveal">
      <a href="/" class="auth-logo">NOM<em>A</em>D</a>
      <div class="auth-tagline">"Run every table. Own every moment."</div>
      
      <h1 class="auth-title">Owner Sign In</h1>
      <p class="auth-subtitle">Access your restaurant command center.</p>

      <form method="POST" action="{% url 'owner_login' %}">
        {% csrf_token %}
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input type="email" id="email" name="email" class="form-control" required autofocus placeholder="owner@restaurant.com">
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div style="position: relative;">
            <input type="password" id="password" name="password" class="form-control" required placeholder="••••••••">
            <button type="button" class="btn-ghost" data-toggle-password="#password" style="position: absolute; right: 8px; top: 50%; transform: translateY(-50%); padding: 4px; border: none;">
              <i data-lucide="eye" style="width: 18px; height: 18px;"></i>
            </button>
          </div>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 8px;">Sign In to Dashboard</button>
      </form>

      <div style="margin-top: 32px; font-size: 14px; color: var(--text-muted); text-align: center;">
        New here? <a href="{% url 'owner_signup' %}" class="auth-link">Register your restaurant →</a>
      </div>
      <div style="margin-top: 16px; font-size: 14px; color: var(--text-muted); text-align: center;">
        Are you staff? <a href="{% url 'staff_login' %}" class="auth-link">Staff Login</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
