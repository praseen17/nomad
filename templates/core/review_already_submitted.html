{% extends 'base.html' %}
{% block title %}Review Expired | NOMAD{% endblock %}

{% block content %}
<div class="auth-page" style="align-items: center; justify-content: center;">
  <div class="auth-box reveal" style="max-width: 400px; text-align: center; border: 1px solid var(--border); box-shadow: var(--shadow-lg);">
    <div style="width: 80px; height: 80px; border-radius: 50%; background: rgba(232,169,58,0.1); display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; color: var(--accent-2); border: 2px solid rgba(232,169,58,0.2);">
      <i data-lucide="shield-alert" style="width: 40px; height: 40px;"></i>
    </div>
    <h1 style="font-family: var(--font-display); font-size: 32px; font-weight: 700; margin-bottom: 12px;">Link Expired</h1>
    <p style="color: var(--text-muted); font-size: 14px; line-height: 1.6; margin-bottom: 32px;">
      The feedback token associated with this invoice has already been used. Security policies prevent duplicate reviews.
    </p>
    <a href="/" class="btn-ghost" style="border: 1px solid var(--border); width: 100%; justify-content: center;">Return Home</a>
  </div>
</div>
{% endblock %}
